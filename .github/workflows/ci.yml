name: CI — SGFV

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [service-vehicules, service-conducteurs, service-maintenance]

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Installer dépendances (${{ matrix.service }})
        run: cd ${{ matrix.service }} && npm ci

      - name: Lancer les tests (${{ matrix.service }})
        run: cd ${{ matrix.service }} && npm test

  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Vérifier la configuration docker-compose
        run: docker compose config

      - name: Build de toutes les images
        run: docker compose build --parallel

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer dépendances frontend
        run: cd frontend && npm install

      - name: Build de production
        run: cd frontend && npm run build
