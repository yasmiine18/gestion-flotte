# SGFV — docker-compose.yml
# Toute la stack : BDD, Kafka, microservices, frontend, observabilité, Keycloak

services:

  # ─── Bases de données ──────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: flotte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     flotte
      POSTGRES_PASSWORD: flotte
      POSTGRES_DB:       flotte
    ports:
      - "5432:5432"
    volumes:
      - flotte_pgdata:/var/lib/postgresql/data
      - ./infra:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flotte"]
      interval: 5s
      timeout: 5s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: flotte-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER:     flotte
      POSTGRES_PASSWORD: flotte
      POSTGRES_DB:       localisation_db
    ports:
      - "5433:5432"
    volumes:
      - flotte_tsdata:/var/lib/postgresql/data
      - ./service-localisation/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flotte -d localisation_db"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ─── Kafka ─────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: flotte-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: flotte-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Microservices ─────────────────────────────────────────────────────────

  service-vehicules:
    build: ./service-vehicules
    container_name: flotte-vehicules
    restart: unless-stopped
    environment:
      PORT:                    8081
      JWT_SECRET:              secret123
      DB_HOST:                 postgres
      DB_PORT:                 5432
      DB_USER:                 flotte
      DB_PASSWORD:             flotte
      DB_NAME:                 vehicules_db
      SERVICE_CONDUCTEURS_URL: http://service-conducteurs:8082
      KAFKA_ENABLED:           "true"
      KAFKA_BROKER:            kafka:9092
      KAFKA_TOPIC:             vehicules.events
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/sgfv
      KEYCLOAK_CLIENT_ID: sgfv-frontend
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  service-conducteurs:
    build: ./service-conducteurs
    container_name: flotte-conducteurs
    restart: unless-stopped
    environment:
      PORT:                  8082
      JWT_SECRET:            secret123
      DB_HOST:               postgres
      DB_PORT:               5432
      DB_USER:               flotte
      DB_PASSWORD:           flotte
      DB_NAME:               conducteurs_db
      SERVICE_VEHICULES_URL: http://service-vehicules:8081
      KAFKA_ENABLED:         "true"
      KAFKA_BROKER:          kafka:9092
      KAFKA_TOPIC:           conducteurs.events
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/sgfv
      KEYCLOAK_CLIENT_ID: sgfv-frontend
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  service-maintenance:
    build: ./service-maintenance
    container_name: flotte-maintenance
    restart: unless-stopped
    environment:
      PORT:                  8084
      JWT_SECRET:            secret123
      DB_HOST:               postgres
      DB_PORT:               5432
      DB_USER:               flotte
      DB_PASSWORD:           flotte
      DB_NAME:               maintenance_db
      SERVICE_VEHICULES_URL: http://service-vehicules:8081
      KAFKA_ENABLED:         "true"
      KAFKA_BROKER:          kafka:9092
      KAFKA_TOPIC:           maintenance.events
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/sgfv
      KEYCLOAK_CLIENT_ID: sgfv-frontend
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  service-localisation:
    build: ./service-localisation
    container_name: flotte-localisation
    restart: unless-stopped
    environment:
      PORT:          8083
      GRPC_PORT:     50051
      JWT_SECRET:    secret123
      DB_HOST:       timescaledb
      DB_PORT:       5432
      DB_USER:       flotte
      DB_PASSWORD:   flotte
      DB_NAME:       localisation_db
      KAFKA_ENABLED: "true"
      KAFKA_BROKER:  kafka:9092
      KAFKA_TOPIC:   geofence.alerts
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/sgfv
      KEYCLOAK_CLIENT_ID: sgfv-frontend
    ports:
      - "8083:8083"
      - "50051:50051"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  service-evenements:
    build: ./service-evenements
    container_name: flotte-evenements
    restart: unless-stopped
    environment:
      PORT:           8086
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_USER:        flotte
      DB_PASSWORD:    flotte
      DB_NAME:        evenements_db
      KAFKA_BROKER:   kafka:9092
      KAFKA_GROUP_ID: service-evenements-group
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./api-gateway
    container_name: flotte-gateway
    restart: unless-stopped
    environment:
      PORT:                    4000
      SERVICE_VEHICULES_URL:   http://service-vehicules:8081
      SERVICE_CONDUCTEURS_URL: http://service-conducteurs:8082
      SERVICE_MAINTENANCE_URL: http://service-maintenance:8084
      SERVICE_LOCALISATION_URL: http://service-localisation:8083
      SERVICE_EVENEMENTS_URL:  http://service-evenements:8086
      JWT_SECRET:              secret123
    ports:
      - "4000:4000"
    depends_on:
      service-vehicules:
        condition: service_healthy
      service-conducteurs:
        condition: service_healthy
      service-maintenance:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: flotte-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway

  # ─── Sécurité ──────────────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: flotte-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8085:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15

  # ─── Observabilité ─────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: flotte-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: flotte-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4319:4317"
      - "9464:9464"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:latest
    container_name: flotte-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: flotte-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards

  loki:
    image: grafana/loki:latest
    container_name: flotte-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

volumes:
  flotte_pgdata:
  flotte_tsdata:
  grafana-storage:
